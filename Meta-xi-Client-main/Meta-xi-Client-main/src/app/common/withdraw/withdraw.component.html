<!-- Ambient Background Orbs -->
<div class="ambient-orb orb-gold"></div>
<div class="ambient-orb orb-green"></div>

<div class="app-container">
  <!-- Header -->
  <div class="nav-header">
    <a routerLink="/home" class="back-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      VOLVER
    </a>
    <div class="security-badge">NODE: SECURE</div>
  </div>

  <!-- Balance Card -->
  <div class="balance-card">
    <div class="balance-info">
      <span class="balance-label">Capital Disponible</span>
      <span class="balance-amount">{{ displayBalance }} <span class="currency">{{ currency }}</span></span>
    </div>
    <div class="status-pill">⚡ RETIRO 24H</div>
  </div>

  <!-- Amount Input -->
  <div class="input-wrapper">
    <label class="input-label">
      Monto a retirar
      <span [style.color]="amountHintColor">Min. {{ MIN_AMOUNT | number:'1.0-2' }} {{ currency }}</span>

    </label>
    <span [style.color]="amountHintColor" *ngIf="insuficient">Fondos insuficientes</span>
    <input type="number"
           class="apex-input"
           [class.valid]="amountValid"
           [class.invalid]="amountInvalid"
           [placeholder]="'0 ' + currency"
           [(ngModel)]="amount"
           (input)="validate()">
  </div>

  <!-- Account Number -->
  <div class="input-wrapper">
    <label class="input-label">Cuenta Destino</label>
    <div class="combo-row">
      <div class="method-block">{{ methodName }}</div>
      <div style="position: relative; flex: 1;">
        <input [type]="isNequi ? 'tel' : 'text'"
               class="apex-input"
               [ngStyle]="{ 'padding-right': '75px' }"
               [placeholder]="isNequi ? '300 000 0000' : 'Dirección USDT-BEP20'"
               [(ngModel)]="accountNumber"
               (input)="validate()">
        <button type="button" class="paste-btn" (click)="pasteFromClipboard()">PEGAR</button>
      </div>
    </div>
  </div>

  <!-- Password -->
  <div class="input-wrapper">
    <label class="input-label">Firma de Seguridad</label>
    <input type="password"
           class="apex-input"
           placeholder="••••••••"
           [(ngModel)]="password"
           (input)="validate()">
  </div>

  <!-- Captcha -->
  <div class="input-wrapper">
    <label class="input-label">Autenticación Anti-Bot</label>
    <div class="captcha-container">
      <div class="captcha-plate"
           [class.refreshing]="captchaFlipping"
           (click)="regenerateCaptcha()">
        {{ activeCaptcha }}
      </div>
      <input type="text"
             class="apex-input captcha-input"
             placeholder="Código"
             [(ngModel)]="captchaInput"
             (input)="validate()"
             maxlength="4">
    </div>
  </div>

  <!-- Ledger -->
  <div class="ledger-box">
    <div class="ledger-row">
      <span>Comisión de Red ({{ feePercent }}%)</span>
      <span class="ledger-val">{{ displayFee }} {{ currency }}</span>
    </div>
    <div class="ledger-divider"></div>
    <div class="ledger-row highlight-row">
      <span>Acreditación Final</span>
      <span class="ledger-val">{{ displayNet }} {{ currency }}</span>
    </div>
  </div>

  <!-- Submit Button -->
  <button class="btn-apex"
          [class.unlocked]="canSubmit"
          [disabled]="submitting || !canSubmit"
          (click)="requestWithdrawal()">
    {{ submitting ? 'ENCRIPTANDO...' : 'Confirmar Transacción' }}
  </button>
</div>
