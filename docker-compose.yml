version: "3.9"

services:
  # ==========================================
  # Backend .NET 8
  # ==========================================
  api:
    build:
      context: ./Meta-xi-Api-main/Meta-xi-Api-main
      dockerfile: Dockerfile
    container_name: meta-xi-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:5071}
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=${DB_PORT};Username=${DB_USERNAME};Password=${DB_PASSWORD};Database=${DB_DATABASE}
      - JwtSettings__Secret=${JWT_SECRET}
    ports:
      - "5071:5071"
    networks:
      - meta-xi-net

  # ==========================================
  # Frontend Angular + Nginx
  # ==========================================
  client:
    build:
      context: ./Meta-xi-Client-main/Meta-xi-Client-main
      dockerfile: Dockerfile
    container_name: meta-xi-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - meta-xi-net

networks:
  meta-xi-net:
    driver: bridge